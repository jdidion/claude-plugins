# Triage routing rules
# These rules supplement the LLM-based evaluation with deterministic routing.
# Matched rules take priority over LLM confidence scoring.

# Articles from these domains go straight to Inbox
inbox_domains:
  - biorxiv.org
  - medrxiv.org
  - nature.com/articles
  - genomeweb.com
  - doi.org/10.1093/bioinformatics
  - doi.org/10.1093/bib
  - doi.org/10.1186  # BMC journals
  - genome.cshlp.org

# Articles with these keywords in the title go to Inbox
inbox_title_keywords:
  - variant calling
  - variant caller
  - cfDNA
  - cell-free DNA
  - nanopore
  - methylation
  - copy number
  - CNV detection
  - aneuploidy
  - uniparental disomy
  - fetal fraction
  - carrier screening
  - prenatal
  - sequencing pipeline
  - WDL
  - Nextflow

# Meta-science and cross-cutting methodology → bias toward Review (not Ignored)
# These benefit any researcher regardless of specific field
review_title_keywords:
  - reproducibility
  - staying current
  - data visualization
  - interpretable
  - benchmarking
  - meta-analysis
  - best practices
  - code review
  - scientific computing

# Articles matching these patterns go to Ignored
ignored_title_patterns:
  - "Sign Up | LinkedIn"  # broken LinkedIn saves
  - "Release v"  # minor release notes (unless tool is actively used)

# Source weighting: Instapaper saves are hand-curated (higher signal)
# When uncertain, prefer Review over Ignored for Instapaper-sourced articles
source_weights:
  instapaper: 0.7   # bias toward Review/Inbox
  rss: 0.5          # neutral

# High-prestige-gated routing — applied when a feed in feeds.yaml has
# `triage_mode: high-prestige-gated`. Articles from these feeds default to
# Ignored unless one of the bypass signals fires:
#
#   1. inbox_keyword_match  — title or summary contains a substring from
#                             inbox_title_keywords (above). Free, no API.
#   2. in_news              — OpenAlex FWCI for the article's DOI ≥
#                             in_news_threshold (free, no key, but DOI must
#                             be extractable from the publisher's URL).
#   3. gemma_high_interest  — Gemma already classified as high-interested
#                             with read-now/save-reference. We trust this
#                             over the prestige-gate (article matched the
#                             topic prior on its own).
#
# Default destination on a no-bypass article: Ignored.
high_prestige_gated:
  bypass_signals:
    - inbox_keyword_match
    - in_news
    - gemma_high_interest
  in_news_threshold: 1.0   # FWCI >= 1.0 fires the in_news bypass.
                           # Empirical: ~2% of recent Nature papers cross this in
                           # the first 30 days. Tunable; raise to make the gate
                           # stricter, lower to fire more aggressively.
  bypass_destination: Inbox
  default_destination: Ignored

# Autonomy-level routing overrides (read from config/accuracy-stats.yaml)
# These constrain how aggressively the LLM can route articles to Ignored
autonomy_overrides:
  level_0:  # Cold start — very conservative
    instapaper_min_confidence: uncertain       # never ignored, Review at worst
    rss_ignore_requires: deterministic_rule    # LLM alone can't ignore RSS
    prompt_review_ignored: always              # remind after every triage run
  level_1:  # Normal — standard three-tier
    instapaper_min_confidence: high-not-interested  # normal routing
    rss_ignore_requires: llm_or_rule           # LLM can ignore freely
    prompt_review_ignored: 14_days             # remind if not run in 14 days
  level_2:  # Confident — less conservative
    instapaper_min_confidence: high-not-interested
    rss_ignore_requires: llm_or_rule
    prompt_review_ignored: 30_days             # monthly reminder
  level_3:  # Auto-recycle — known patterns skip human review
    instapaper_min_confidence: high-not-interested
    rss_ignore_requires: llm_or_rule
    auto_recycle_patterns: true                # confirmed junk patterns auto-recycled
    prompt_review_ignored: 30_days
