# Copy to ~/.config/ed/config.toml (or drop a .ed.toml in a repo root).
# All keys optional. Repo-local .ed.toml overrides user config on conflict.

[defaults]
editor = "hx"
viewer = "micro"

[extensions.md]
editor = "hx"
viewer = "glow -p"
viewer_live = "bash -c 'while :; do clear; glow \"$1\"; sleep 1; done' --"

[extensions.pdf]
viewer = "zathura"

[extensions.csv]
viewer = "csvlens"

[extensions.json]
viewer = "jq -C . | less -R"

[extensions.html]
viewer = "cmux browser open"
