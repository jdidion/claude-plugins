# Copy to ~/.config/ed/config.toml (or drop a .ed.toml in a repo root).
# All keys optional. Repo-local .ed.toml overrides user config on conflict.

[defaults]
editor = "micro"
viewer = "micro"

[extensions.md]
viewer = "glow -p"
# Hot reload: when `entr` is installed (brew install entr), the plugin
# auto-wraps the above `viewer` so it restarts on every save. No
# viewer_live needed. Override below if you want a bespoke recipe.
# viewer_live = "bash -c 'echo \"$1\" | entr -r glow -p \"$1\"' --"

[extensions.pdf]
viewer = "cmux browser open"  # self-watching, never auto-wrapped

[extensions.csv]
viewer = "csvlens"

[extensions.json]
viewer = "jq -C . | less -R"

[extensions.html]
viewer = "cmux browser open"  # self-watching, never auto-wrapped
