# Voice profile — auto-generated by /salvage --learn
# Edit manually to fine-tune, or re-run --learn to regenerate.

# Statistical patterns (from analyze-voice.py)
stats:
  sentence_length_mean: null
  sentence_length_std_dev: null
  contraction_rate_per_1k: null
  first_person_rate_per_1k: null
  question_pct: null
  type_token_ratio: null

# Punctuation preferences (from analyze-voice.py)
punctuation:
  em_dashes: null     # per 1k words; null = no preference
  semicolons: null
  exclamations: null
  parentheses: null

# LLM-observed style notes (from --learn analysis pass)
# These are higher-order observations the script can't detect.
style_notes: []
# Example entries:
# - "Starts paragraphs with concrete examples, not abstractions"
# - "Uses analogies from biology and systems engineering"
# - "Confrontational tone — states disagreements directly"
# - "Rarely uses rhetorical questions"
# - "Prefers numbered lists over bullet lists"

# Vocabulary preferences
preferred_words: []     # words the user gravitates toward
avoided_words: []       # words the user never uses (beyond standard tier1)

# Structural preferences
structure:
  typical_opener: null  # e.g., "concrete example", "direct claim", "question"
  typical_closer: null  # e.g., "action item", "open question", "none"
  paragraph_style: null # e.g., "short (2-3 sentences)", "varied", "long form"
  list_usage: null      # e.g., "frequent", "rare", "numbered only"

# Sample files used to generate this profile
samples: []
last_updated: null
